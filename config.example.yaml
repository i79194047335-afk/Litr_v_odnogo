collector:
  # Live WS collector — numeric Lighter market IDs.
  # Run `python -m src.collector.list_markets` once to find IDs.
  # Typically ETH = 0, BTC = 1, but verify.
  market_ids: [0, 1]
  out_dir: data/ticks

backfill:
  # Historical Lighter trade backfill via 0xArchive.
  # Run `python -m src.collector.oxarchive_backfill list-markets` first to
  # confirm symbol names on 0xArchive (Lighter uses ticker symbols, not IDs).
  symbols: [BTC, ETH, XAU, SOL, HYPE]
  start_date: "2025-08-01"   # Lighter fills coverage on 0xArchive starts Aug 2025
  page_limit: 1000           # max per page (1 credit per page)
  max_pages_per_day: 5000    # safety cap: abort day if more pages (5M trades/day)
  pause_between_pages_s: 0.1 # ~10 req/s, well under 15 req/s free-tier limit

rangebars:
  # Lighter prices are integers internally; size in PRICE units of the instrument.
  # mrcvokka heuristic: ~30% of average 1-minute candle range for the session.
  # Calibrate from collected ticks before backtesting.
  range_size:
    0: 0.50   # ETH placeholder
    1: 5.00   # BTC placeholder

indicators:
  ema_fast: 15
  ema_slow: 20
  keltner: { period: 35, mult_inner: 4, mult_outer: 8 }
  stochastic: { k: 3, d: 2, smooth: 3 }

backtest:
  fee_maker_bps: 0     # confirmed zero on ETH; verify per market
  fee_taker_bps: 0     # confirmed zero on ETH; verify per market
  slippage_ticks: 1
  risk_per_trade: 0.005
