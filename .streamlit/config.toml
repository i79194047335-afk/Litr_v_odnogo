# The panel has NO authentication and can place, cancel and close real
# orders. Streamlit's default binds to every interface (server.address
# unset => 0.0.0.0); this VPS has a public IP and no firewall (iptables
# INPUT policy ACCEPT, no rules), so the default published a trading UI to
# the open internet. It did, on 2026-07-17, for as long as the panel ran.
#
# Loopback is the safe default and the right one for a laptop: reach it via
#     ssh -N -L 8501:127.0.0.1:8501 root@<vps>
#
# On Ivan's VPS the panel is reached from a phone over the Amnezia VPN,
# where an SSH tunnel is impractical, so it runs with
# STREAMLIT_SERVER_ADDRESS=0.0.0.0 and iptables restricts 8501 to the VPN
# subnet. See panel.py's docstring for the rules — the address alone is
# then NOT what protects it, the firewall is, and the firewall does not
# survive a reboot.
#
# Overriding this to 0.0.0.0 without those rules puts a keyed, no-auth
# trading UI on the open internet. That happened on 2026-07-17.
[server]
address = "127.0.0.1"
port = 8501
headless = true
